{% extends "base.html" %}

{% load static %}

{% block title %}Log Workout{% endblock %}

{% block content %}
<div class="row mb-5">
    <div class="col-md-8">
        <h1 class="h2 fw-bold">Track Your Session</h1>
        <p class="text-muted">Log your sets and reps.</p>
    </div>
</div>

<form method="POST" id="workout-log-form" class="col-lg-8 mx-auto">
    {% csrf_token %}

    <div id="exercise-cards">
        <!-- Dynamic exercise cards are injected here -->
    </div>

    <!-- Add Exercise Button -->
    <div class="d-grid gap-2 d-md-block mb-5">
        <button type="button" class="btn btn-outline-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addExerciseModal">
            <i class="fas fa-plus me-2"></i> Add Exercise
        </button>
    </div>

    <div class="d-grid gap-2 border-top pt-5">
        <button type="submit" class="btn btn-success btn-lg rounded-pill py-3 fw-bold shadow">
            Finish & Save Workout
        </button>
    </div>
</form>

<!-- Add Exercise Modal -->
<div class="modal fade" id="addExerciseModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-lg">
            <div class="modal-header border-0 p-4">
                <h5 class="modal-title fw-bold">Choose Exercise</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <input type="text" id="exercise-search" class="form-control mb-3" placeholder="Search...">
                <div class="list-group" id="exercise-list" style="max-height: 300px; overflow-y: auto;">
                    {% for exercise in exercises %}
                        <button type="button" class="list-group-item list-group-item-action border-0"
                                data-id="{{ exercise.id }}"
                                data-name="{{ exercise.name|title }}"
                                data-is-bw="{% if exercise.equipment == 'body weight' %}true{% else %}false{% endif %}">
                            {{ exercise.name|title }}
                        </button>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/workout_log.js' %}"></script>
{% endblock %}
